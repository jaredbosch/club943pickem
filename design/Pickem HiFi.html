<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>thepickempool · HiFi</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  html,body,#root { margin:0; padding:0; width:100%; height:100%; background:#0a0a0b; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="./design-canvas.jsx"></script>
  <script type="text/babel" src="./hifi/pp-system.jsx"></script>
  <script type="text/babel" src="./hifi/pp-dashboard.jsx"></script>
  <script type="text/babel" src="./hifi/pp-picks.jsx"></script>
  <script type="text/babel" src="./hifi/pp-grid.jsx"></script>
  <script type="text/babel" src="./hifi/pp-profile.jsx"></script>

  <script type="text/babel" data-presets="react">
    const TWEAKS = /*EDITMODE-BEGIN*/{
      "theme": "light"
    }/*EDITMODE-END*/;

    function App() {
      const [theme, setTheme] = React.useState(TWEAKS.theme || 'dark');
      const [editMode, setEditMode] = React.useState(false);

      React.useEffect(() => {
        const onMsg = (e) => {
          const d = e.data;
          if (!d || typeof d !== 'object') return;
          if (d.type === '__activate_edit_mode') setEditMode(true);
          if (d.type === '__deactivate_edit_mode') setEditMode(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      // Toggle the .light class on every .pp artboard.
      React.useEffect(() => {
        document.querySelectorAll('.pp').forEach(el => {
          if (theme === 'light') el.classList.add('light');
          else el.classList.remove('light');
        });
        // also observe for any newly-rendered .pp elements
        const mo = new MutationObserver(() => {
          document.querySelectorAll('.pp').forEach(el => {
            if (theme === 'light') el.classList.add('light');
            else el.classList.remove('light');
          });
        });
        mo.observe(document.body, { childList: true, subtree: true });
        return () => mo.disconnect();
      }, [theme]);

      const updateTheme = (v) => {
        setTheme(v);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme: v } }, '*');
      };

      return (
        <>
          <DesignCanvas>
            <DCSection id="dashboard" title="1 · Dashboard" subtitle="ESPN-style leaderboard · live ticker · team stats · activity feed">
              <DCArtboard id="dash" label="Dashboard · hi-fi" width={1400} height={1000}>
                <DashboardHi/>
              </DCArtboard>
            </DCSection>

            <DCSection id="picks" title="2 · Make Picks" subtitle="B primary (confidence ladder) + A secondary (split team-color cards)">
              <DCArtboard id="picks-b" label="B · Confidence ladder · PRIMARY" width={760} height={1080}>
                <MakePicksHiB/>
              </DCArtboard>
              <DCArtboard id="picks-a" label="A · Split card · team-color flood" width={760} height={1080}>
                <MakePicksHiA/>
              </DCArtboard>
            </DCSection>

            <DCSection id="grid" title="3 · Weekly Grid" subtitle="Heatmap · filled team-colored squares · W/L marks · consensus footer">
              <DCArtboard id="grid" label="Weekly Grid · heatmap · hi-fi" width={1400} height={1000}>
                <WeeklyGridHi/>
              </DCArtboard>
            </DCSection>

            <DCSection id="profile" title="4 · Profile" subtitle="KPI row · weekly bars · pick history · tendencies">
              <DCArtboard id="profile" label="Profile · hi-fi" width={1400} height={1000}>
                <ProfileHi/>
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          {editMode && (
            <div style={{
              position:'fixed', right:16, bottom:16, zIndex:9999,
              width:280, background:'#131317', color:'#f5f5f7',
              border:'1px solid #2a2a33', borderRadius:6,
              boxShadow:'0 16px 40px rgba(0,0,0,0.5)',
              padding:16, fontFamily:'Inter, -apple-system, system-ui, sans-serif'
            }}>
              <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}}>
                <span style={{fontFamily:'Barlow Condensed, sans-serif', fontWeight:800, fontSize:16, letterSpacing:'0.02em', textTransform:'uppercase'}}>Tweaks</span>
                <span style={{fontSize:10, fontFamily:'JetBrains Mono, ui-monospace', color:'#6a6a75', letterSpacing:'0.08em'}}>TPP · HIFI</span>
              </div>
              <div style={{fontSize:10, textTransform:'uppercase', letterSpacing:'0.1em', color:'#6a6a75', marginBottom:6, fontFamily:'JetBrains Mono, monospace'}}>Theme</div>
              <div style={{display:'flex', gap:6}}>
                {['dark','light'].map(t=>(
                  <button key={t}
                    onClick={()=>updateTheme(t)}
                    style={{
                      flex:1, padding:'10px', fontSize:12,
                      border:'1px solid #2a2a33', borderRadius:3,
                      background: theme===t ? '#ffcc00' : 'transparent',
                      color: theme===t ? '#000' : '#f5f5f7',
                      cursor:'pointer',
                      fontFamily:'Barlow Condensed, sans-serif',
                      fontWeight:700, textTransform:'uppercase', letterSpacing:'0.04em',
                    }}>{t}</button>
                ))}
              </div>
              <div style={{fontSize:10, color:'#6a6a75', marginTop:12, lineHeight:1.5}}>
                Both dark &amp; light modes are equally polished. Toggle applies to all 5 artboards.
              </div>
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
