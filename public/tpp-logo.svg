<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0a0a0b" rx="48"/>

  <!-- Grid -->
  <rect width="400" height="400" fill="url(#grid)" rx="48"/>

  <!-- Accent corner glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#ffcc00" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#ffcc00" stop-opacity="0"/>
  </radialGradient>
  <rect width="400" height="400" fill="url(#glow)" rx="48"/>

  <!-- Yellow top bar -->
  <rect x="60" y="108" width="280" height="6" fill="#ffcc00" rx="3"/>

  <!-- TPP text -->
  <text
    x="200"
    y="252"
    text-anchor="middle"
    font-family="'Barlow Condensed', 'Arial Narrow', Impact, sans-serif"
    font-size="130"
    font-weight="900"
    letter-spacing="-4"
    fill="#ffffff"
    text-rendering="optimizeLegibility"
  >TPP</text>

  <!-- Tagline -->
  <text
    x="200"
    y="298"
    text-anchor="middle"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="16"
    font-weight="600"
    letter-spacing="6"
    fill="#ffcc00"
  >PICKEM POOL</text>

  <!-- Bottom bar -->
  <rect x="60" y="316" width="280" height="2" fill="rgba(255,255,255,0.08)" rx="1"/>
</svg>
